name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package GNUmakefile
        run: zip modular-make-${{ steps.version.outputs.tag }}.zip GNUmakefile

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: modular-make-${{ steps.version.outputs.tag }}.zip
          generate_release_notes: true
