name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package GNUmakefile
        run: zip GNUmakefile.zip GNUmakefile

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            GNUmakefile
            GNUmakefile.zip
          generate_release_notes: true
